<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caussa</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Barra compacta de Autenticación -->
    <div id="auth-section" class="auth-bar" style="display: none;">
      <div class="auth-bar-summary" id="auth-toggle">
        <span class="auth-indicator" id="auth-dot">●</span>
        <span class="auth-email" id="auth-email">Verificando...</span>
        <span class="auth-chevron" id="auth-chevron">▾</span>
      </div>
      <div class="auth-dropdown" id="auth-dropdown" style="display: none;">
        <button id="login-btn" class="btn-secondary" style="display: none;">Iniciar Sesión en Dashboard</button>
        <button id="logout-btn" class="btn-secondary" style="display: none;">Cerrar Sesión</button>
      </div>
    </div>

    <main>
      <!-- ══════ USUARIO AUTENTICADO ══════ -->
      <div id="authenticated-content" style="display: none;">

        <!-- ══════ NAVEGACIÓN POR TABS ══════ -->
        <nav class="tabs" id="main-tabs">
          <button class="tab active" data-tab="sync">Sincronizar</button>
          <button class="tab" data-tab="chat">Chat IA</button>
        </nav>

        <!-- ══════════════════════════════════════ -->
        <!-- TAB: SINCRONIZAR                       -->
        <!-- ══════════════════════════════════════ -->
        <div id="tab-sync" class="tab-content active">

          <!-- Causa Detectada + Sincronizar -->
          <div id="causa-section" class="card">
            <h2>Causa Detectada</h2>
            <div id="causa-info" class="causa-info">
              <p class="causa-rol" id="causa-rol">--</p>
              <p class="causa-detail" id="causa-tribunal">--</p>
              <p class="causa-detail" id="causa-caratula">--</p>
              <!-- Preview de cuadernos detectados por JwtExtractor (4.16/4.18) -->
              <div id="causa-package-preview" class="causa-package-preview" style="display: none;">
                <span id="causa-cuadernos" class="pkg-badge pkg-badge-cuadernos"></span>
              </div>
            </div>
            <div id="sync-status" class="sync-status" style="display: none;">
              <p id="sync-status-line" class="sync-status-line"></p>
            </div>
            <div id="changes-detected-banner" class="changes-detected-banner" style="display: none;"></div>
            <button id="sync-btn" class="btn-primary btn-sync" disabled>
              <span class="btn-icon">⚡</span>
              Sincronizar
            </button>
          </div>

          <!-- Bloque compacto: progreso y resultado (visible solo durante/tras sync) -->
          <div id="sync-compact" class="card sync-compact" style="display: none;">
            <div class="progress-container">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-status" class="progress-status">Iniciando...</div>
            <div id="sync-compact-result"></div>
            <div id="sync-compact-details"></div>
            <div id="size-warnings-content" style="display: none;"></div>
          </div>
        </div>

        <!-- ══════════════════════════════════════ -->
        <!-- TAB: CHAT IA                           -->
        <!-- ══════════════════════════════════════ -->
        <div id="tab-chat" class="tab-content tab-chat-container">
          <iframe
            id="chat-iframe"
            class="chat-iframe"
            src="about:blank"
            title="Chat IA"
          ></iframe>
        </div>

      </div>

      <!-- ══════ USUARIO NO AUTENTICADO ══════ -->
      <div id="unauthenticated-content" style="display: none;">
        <div class="card">
          <h2>Bienvenido</h2>
          <p>Por favor, inicia sesión en el Dashboard para usar la extensión.</p>
          <button id="open-dashboard-btn" class="btn-primary">Abrir Dashboard</button>
        </div>
      </div>
    </main>

    <!-- ══════ PRIVACY CONSENT MODAL (6.03) ══════ -->
    <div id="privacy-consent-overlay" class="consent-overlay" style="display: none;">
      <div class="consent-modal">
        <div class="consent-header">
          <h3>Antes de sincronizar</h3>
          <p>Para procesar documentos de tu causa necesitamos tu autorización.</p>
        </div>
        <div class="consent-body">
          <label class="consent-checkbox-label" for="consent-check-1">
            <input type="checkbox" id="consent-check-1" class="consent-checkbox" />
            <span>Autorizo el procesamiento de documentos judiciales civiles <strong>no reservados</strong> de mis causas disponibles en PJUD.</span>
          </label>
          <label class="consent-checkbox-label" for="consent-check-2">
            <input type="checkbox" id="consent-check-2" class="consent-checkbox" />
            <span>Entiendo que el sistema utiliza <strong>inteligencia artificial</strong> para el análisis y que sus respuestas son de carácter <strong>asistencial</strong>, no constituyendo asesoría legal.</span>
          </label>
        </div>
        <div class="consent-footer">
          <button id="consent-cancel-btn" class="btn-secondary">Cancelar</button>
          <button id="consent-accept-btn" class="btn-primary" disabled>Aceptar y continuar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="lib/config.js"></script>
  <script src="lib/supabase.js"></script>
  <script src="lib/causa-identity.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
